<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hokkaido First Light - Final</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; width: 800px; height: 1000px; overflow: hidden; }
    body { font-family: Arial, "Hiragino Kaku Gothic ProN", sans-serif; background: #ece7da; }
    .poster { position: relative; width: 800px; height: 1000px; overflow: hidden; color: #113f39; background: #f3efe4; }
    .top-rule { position: absolute; top: 40px; left: 42px; width: 716px; height: 5px; background: #113f39; }
    .meta { position: absolute; top: 61px; left: 44px; font-size: 17px; line-height: 1; font-weight: 800; }
    .issue { position: absolute; top: 59px; right: 44px; font-size: 17px; line-height: 1; color: #d8563f; font-weight: 800; }
    .sun { position: absolute; top: 150px; right: 58px; width: 232px; height: 232px; border-radius: 50%; background: #e65e43; }
    .sun-cut { position: absolute; top: 271px; right: 42px; width: 295px; height: 22px; background: #f3efe4; transform: rotate(-8deg); }
    h1 { position: absolute; top: 112px; left: 38px; z-index: 3; margin: 0; width: 610px; font-size: 108px; line-height: 0.84; font-weight: 900; color: #113f39; }
    .vertical { position: absolute; top: 350px; right: 42px; z-index: 6; writing-mode: vertical-rl; font-size: 24px; line-height: 1.2; font-weight: 800; color: #113f39; }
    .mountain.back { position: absolute; left: -40px; top: 410px; width: 900px; height: 330px; background: #8db3a4; clip-path: polygon(0 78%, 18% 51%, 34% 64%, 55% 19%, 72% 50%, 100% 29%, 100% 100%, 0 100%); }
    .snow { position: absolute; z-index: 2; left: 381px; top: 452px; width: 210px; height: 112px; background: #f3efe4; clip-path: polygon(50% 0, 100% 100%, 68% 72%, 52% 84%, 36% 66%, 0 100%); }
    .mountain.front { position: absolute; left: -75px; top: 512px; width: 980px; height: 315px; background: #174e45; clip-path: polygon(0 68%, 21% 36%, 38% 58%, 61% 21%, 80% 55%, 100% 40%, 100% 100%, 0 100%); }
    .route { position: absolute; z-index: 5; left: 55px; top: 690px; width: 690px; height: 90px; border-top: 9px solid #f3d59b; transform: rotate(-7deg); }
    .route::after { content: ""; position: absolute; top: 19px; left: 0; width: 690px; border-top: 3px solid #f3d59b; }
    .train { position: absolute; z-index: 7; left: 508px; top: 664px; width: 194px; height: 49px; border-radius: 5px 30px 5px 5px; background: #f3d59b; }
    .windows { position: absolute; left: 20px; top: 11px; width: 112px; height: 14px; background: #174e45; box-shadow: 0 20px 0 -5px #e65e43; }
    .wheel { position: absolute; bottom: -10px; width: 20px; height: 20px; border-radius: 50%; background: #113f39; }
    .wheel.one { left: 34px; }
    .wheel.two { right: 34px; }
    .footer { position: absolute; z-index: 9; left: 0; right: 0; bottom: 0; height: 220px; background: #f3efe4; }
    .number { position: absolute; left: 43px; top: 32px; font-size: 98px; line-height: 0.85; font-weight: 900; color: #e65e43; }
    .copy { position: absolute; left: 196px; top: 34px; width: 560px; color: #113f39; }
    .copy strong { display: block; font-size: 38px; line-height: 1.02; font-weight: 900; }
    .copy .jp { display: block; margin-top: 12px; font-size: 24px; line-height: 1.2; font-weight: 800; }
    .copy .action { display: inline-block; margin-top: 23px; padding-top: 10px; border-top: 4px solid #e65e43; font-size: 18px; line-height: 1; font-weight: 900; color: #d8563f; }
  </style>
</head>
<body>
  <main class="poster" aria-label="Hokkaido first-light rail travel poster">
    <div class="top-rule"></div>
    <div class="meta">EAST RAIL / 06:12 DEPARTURE</div>
    <div class="issue">WINTER 01</div>
    <div class="sun"></div>
    <div class="sun-cut"></div>
    <h1>HOKKAI<br>DO</h1>
    <div class="vertical">北へ、光のはじまりへ。</div>
    <div class="mountain back"></div>
    <div class="snow"></div>
    <div class="mountain front"></div>
    <div class="route"></div>
    <div class="train">
      <div class="windows"></div>
      <div class="wheel one"></div>
      <div class="wheel two"></div>
    </div>
    <section class="footer">
      <div class="number">01</div>
      <div class="copy">
        <strong>FOLLOW THE<br>FIRST LIGHT</strong>
        <span class="jp">朝いちばんの景色へ。</span>
        <span class="action">JOURNEY NORTH BY MORNING TRAIN</span>
      </div>
    </section>
  </main>
</body>
</html>
